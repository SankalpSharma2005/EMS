services:

  backend:
    build:
      context: ./backend
    container_name: ems-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
    container_name: ems-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend